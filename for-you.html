<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #16324a;
        --ocean: #3f7ca0;
        --teal: #6b9e97;
        --sand: #f4eedd;
        --card: #fffdf8;
        --coral: #e8834f;
        --gold: #e0ac42;
        --line: #d8cfb8;
      }
      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        background: var(--sand);
        color: var(--navy);
        font-family: "Work Sans", sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      .bg-wash {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse at top,
            rgba(63, 124, 160, 0.1),
            transparent 55%
          ),
          radial-gradient(
            ellipse at bottom,
            rgba(232, 131, 79, 0.08),
            transparent 55%
          ),
          var(--sand);
        z-index: -1;
      }

      .line-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem 1.5rem;
      }

      .line {
        font-family: "Fraunces", serif;
        font-weight: 600;
        font-style: italic;
        line-height: 1.1;
        font-size: clamp(2.4rem, 8vw, 5.2rem);
        color: var(--navy);
        opacity: 0;
        transform: translateY(40px);
        transition:
          opacity 1s ease,
          transform 1s ease;
      }
      .line.in-view {
        opacity: 1;
        transform: translateY(0);
      }
      .line .accent {
        color: var(--coral);
      }
      .line .accent2 {
        color: var(--ocean);
      }

      .wave-deco {
        font-size: 1.6rem;
        margin-bottom: 1rem;
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 1s ease 0.15s,
          transform 1s ease 0.15s;
      }
      .wave-deco.in-view {
        opacity: 0.85;
        transform: translateY(0);
      }

      .signoff {
        font-size: clamp(1.6rem, 4.5vw, 2.4rem);
        margin-top: 1.2rem;
        color: var(--teal);
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 1s ease 0.2s,
          transform 1s ease 0.2s;
        display: block;
      }
      .signoff.in-view {
        opacity: 1;
        transform: translateY(0);
      }

      .photo-section {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.3rem 6rem;
      }
      .photo-wrap {
        max-width: 640px;
        width: 100%;
        opacity: 0;
        transform: translateY(50px) scale(0.97);
        transition:
          opacity 1.1s ease,
          transform 1.1s ease;
      }
      .photo-wrap.in-view {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .photo-wrap img {
        width: 100%;
        display: block;
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(22, 50, 74, 0.22);
        border: 1px solid var(--line);
      }
      .photo-caption {
        text-align: center;
        margin-top: 1rem;
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: 1.05rem;
        color: var(--teal);
      }

      .scroll-hint {
        position: fixed;
        bottom: 1.6rem;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Work Sans", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ocean);
        opacity: 0.7;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
        animation: bob 2.2s ease-in-out infinite;
        z-index: 5;
      }
      .scroll-hint span {
        font-size: 1.1rem;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translate(-50%, 0);
        }
        50% {
          transform: translate(-50%, 8px);
        }
      }
      .scroll-hint.hide {
        opacity: 0;
        pointer-events: none;
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        .line,
        .wave-deco,
        .signoff,
        .photo-wrap {
          transition: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-wash"></div>

    <div class="scroll-hint" id="scrollHint"><span>⌄</span>keep scrolling</div>

    <section class="line-section">
      <div>
        <div class="wave-deco">🌊</div>
        <div class="line">Hey <span class="accent">babe</span>,</div>
      </div>
    </section>

    <section class="line-section">
      <div class="line">hope you have</div>
    </section>

    <section class="line-section">
      <div class="line">an <span class="accent2">amazing</span> day!</div>
    </section>

    <section class="line-section">
      <div>
        <div class="line">Love,</div>
        <span class="signoff">Chris</span>
      </div>
    </section>

    <section class="photo-section">
      <div class="photo-wrap">
        <img src="hero.png" alt="A photo from Martha's Vineyard" />
        <p class="photo-caption">Martha's Vineyard, MA</p>
      </div>
    </section>

    <script>
      (function () {
        var targets = document.querySelectorAll(
          ".line, .wave-deco, .signoff, .photo-wrap",
        );
        var observer = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add("in-view");
              }
            });
          },
          { threshold: 0.4 },
        );
        targets.forEach(function (t) {
          observer.observe(t);
        });

        var hint = document.getElementById("scrollHint");
        window.addEventListener("scroll", function () {
          if (window.scrollY > 80) {
            hint.classList.add("hide");
          } else {
            hint.classList.remove("hide");
          }
        });
      })();
    </script>
  </body>
</html>
